<!DOCTYPE html>
<html>
<head>
    <title>Forms Assignment</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f, #1c1c3c, #000000);
            background-size: 300% 300%;
            animation: gradientShift 12s ease infinite;
            color: #e6e6e6;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h2 {
            color: #66b3ff;
            font-weight: 600;
        }

        .nav-buttons button {
            background: #222;
            color: #fff;
            border: 2px solid #66b3ff;
            padding: 10px 20px;
            margin-right: 10px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
            font-size: 15px;
        }

        .nav-buttons button:hover {
            background: #66b3ff;
            color: #000;
        }

        form label {
            display: inline-block;
            width: 140px;
        }

        form div {
            margin-bottom: 10px;
        }

        input[type="text"], input[type="email"], input[type="number"], input[type="password"] {
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #2a2a2a;
            color: #fff;
            width: 200px;
        }

        input[type="submit"] {
            background: #66b3ff;
            color: #000;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        input[type="submit"]:disabled {
            background: #444;
            color: #777;
            cursor: not-allowed;
        }

        input[type="submit"]:hover:enabled {
            background: #99ccff;
        }

        .page {
            display: none;
            margin-top: 20px;
        }

        #home {
            display: block;
        }

        .error {
            color: #ff6666;
            font-size: 13px;
            height: 16px;
        }

        hr {
            border: 1px solid #444;
        }
    </style>

    <script>
        window.onload = function() {
            document.querySelectorAll("input").forEach(i => i.value = "");
        };

        function showPage(pageId) {
            document.getElementById("home").style.display = "none";
            document.getElementById("userinfo").style.display = "none";
            document.getElementById("password").style.display = "none";
            document.getElementById(pageId).style.display = "block";
        }

        const cleanPattern = /^[A-Za-z]+$/;
        const foodPattern = /^[A-Za-z ]+$/;
        const noWeirdChars = /^[\x20-\x7E]+$/;

        function validateHome() {
            let name = document.getElementById("name").value.trim();
            let email = document.getElementById("email").value.trim();
            let valid = true;

            if (!cleanPattern.test(name) || name.length < 2 || name.length > 20) {
                document.getElementById("err_name").innerText = "Name must be 2–20 letters only.";
                valid = false;
            } else document.getElementById("err_name").innerText = "";

            if (!noWeirdChars.test(email) || email.length < 3) {
                document.getElementById("err_email").innerText = "Invalid email characters.";
                valid = false;
            } else document.getElementById("err_email").innerText = "";

            document.getElementById("submit").disabled = !valid;
        }

        function setAction(form, name, email) {
            alert("Hi, " + name + "! Thanks for letting me know " + email + " is your email!");
            return false;
        }

        function registerUser() {
            alert(document.user_form.action);
            return false;
        }

        function validateUserInfo() {
            let first = document.getElementById("first").value.trim();
            let last = document.getElementById("last").value.trim();
            let age = document.getElementById("age").value.trim();
            let food = document.getElementById("food").value.trim();
            let valid = true;

            if (!cleanPattern.test(first) || first.length < 2 || first.length > 20) {
                document.getElementById("err_first").innerText = "First name must be 2–20 letters.";
                valid = false;
            } else document.getElementById("err_first").innerText = "";

            if (!cleanPattern.test(last) || last.length < 2 || last.length > 20) {
                document.getElementById("err_last").innerText = "Last name must be 2–20 letters.";
                valid = false;
            } else document.getElementById("err_last").innerText = "";

            let ageNum = Number(age);
            if (isNaN(ageNum) || ageNum < 1 || ageNum > 130) {
                document.getElementById("err_age").innerText = "Age must be 1–130.";
                valid = false;
            } else document.getElementById("err_age").innerText = "";

            if (!foodPattern.test(food) || food.length < 2 || food.length > 30) {
                document.getElementById("err_food").innerText = "Food must be 2–30 letters/spaces.";
                valid = false;
            } else document.getElementById("err_food").innerText = "";

            document.getElementById("submit_info").disabled = !valid;
        }

        function showUserInfo() {
            let first = document.getElementById("first").value.trim();
            let last = document.getElementById("last").value.trim();
            let age = document.getElementById("age").value.trim();
            let food = document.getElementById("food").value.trim();
            alert("Hello " + first + " " + last + "! You are " + age + " years old, and your favorite food is " + food + "!");
            return false;
        }

        function validatePassword() {
            let guess = document.getElementById("pwguess").value.trim();
            let valid = noWeirdChars.test(guess);
            document.getElementById("err_pw").innerText = valid ? "" : "Invalid characters.";
            document.getElementById("submit_pw").disabled = !valid;
        }

        function checkPassword() {
            let guess = document.getElementById("pwguess").value.trim();
            if (guess === "123") alert("Correct! You guessed the password!");
            else alert("Sorry, that is not the password.");
            return false;
        }
    </script>
</head>

<body>

    <div class="nav-buttons">
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('userinfo')">User Info Form</button>
        <button onclick="showPage('password')">Password Guess Form</button>
    </div>

    <div id="home" class="page">
        <h2>Original Form</h2>

        <form autocomplete="off" oninput="validateHome()" onsubmit="return setAction(this, name.value, email.value)">
            <div>
                <label>Name:</label>
                <input id="name" type="text">
            </div>
            <div class="error" id="err_name"></div>

            <div>
                <label>Email:</label>
                <input id="email" type="email">
            </div>
            <div class="error" id="err_email"></div>

            <div>
                <input id="submit" type="submit" disabled>
            </div>
        </form>

        <hr>

        <form name="user_form" autocomplete="off">
            <div>
                <input id="register" type="submit" value="Register" onclick="return registerUser()">
            </div>
        </form>
    </div>

    <div id="userinfo" class="page">
        <h2>User Information Form</h2>

        <form autocomplete="off" oninput="validateUserInfo()" onsubmit="return showUserInfo()">
            <div>
                <label>First Name:</label>
                <input id="first" type="text">
            </div>
            <div class="error" id="err_first"></div>

            <div>
                <label>Last Name:</label>
                <input id="last" type="text">
            </div>
            <div class="error" id="err_last"></div>

            <div>
                <label>Age:</label>
                <input id="age" type="number" min="1">
            </div>
            <div class="error" id="err_age"></div>

            <div>
                <label>Favorite Food:</label>
                <input id="food" type="text">
            </div>
            <div class="error" id="err_food"></div>

            <div>
                <input id="submit_info" type="submit" value="Submit Info" disabled>
            </div>
        </form>
    </div>

    <div id="password" class="page">
        <h2>Password Guess Form</h2>

        <form autocomplete="off" oninput="validatePassword()" onsubmit="return checkPassword()">
            <div>
                <label>Password Guess:</label>
                <input id="pwguess" type="password">
            </div>
            <div class="error" id="err_pw"></div>

            <div>
                <input id="submit_pw" type="submit" value="Guess Password" disabled>
            </div>
        </form>
    </div>

</body>
</html>
