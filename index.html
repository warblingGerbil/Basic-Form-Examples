    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f, #1c1c3c, #000000);
            background-size: 300% 300%;
            animation: gradientShift 12s ease infinite;
            color: #e6e6e6;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h2 {
            color: #66b3ff;
            font-weight: 600;
        }

        .nav-buttons button {
            background: #222;
            color: #fff;
            border: 2px solid #66b3ff;
            padding: 10px 20px;
            margin-right: 10px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
            font-size: 15px;
        }

        .nav-buttons button:hover {
            background: #66b3ff;
            color: #000;
        }

        form label {
            display: inline-block;
            width: 140px;
        }

        form div {
            margin-bottom: 10px;
        }

        input[type="text"], input[type="email"], input[type="number"], input[type="password"] {
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #2a2a2a;
            color: #fff;
            width: 200px;
            transition: border 0.3s;
        }

        input.invalid {
            border: 2px solid #ff4d4d;
        }

        input.valid {
            border: 2px solid #4dff88;
        }

        input[type="submit"] {
            background: #66b3ff;
            color: #000;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        input[type="submit"]:hover {
            background: #99ccff;
        }

        .page {
            display: none;
            margin-top: 20px;
        }

        #home {
            display: block;
        }

        hr {
            border: 1px solid #444;
        }

        .error {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 4px;
            display: block;
            opacity: 0;
            animation: fadeIn 0.4s forwards;
        }

        .success {
            color: #4dff88;
            font-size: 14px;
            margin-top: 10px;
            opacity: 0;
            animation: fadeIn 0.4s forwards;
        }

        .info-text {
            color: #aaa;
            margin-top: 10px;
            font-size: 14px;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>

        <button onclick="showPage('userinfo')">User Info Form</button>

            <div>
                <label>Name:</label>
                <input id="name" name="name" type="text">

                <label>Email:</label>
                <input id="email" name="email" type="email">

            </div>

        </div>

    <div id="userinfo" class="page">
        <h2>User Information Form</h2>

        <form onsubmit="return showUserInfo()">
            <div>
                <label>First Name:</label>
                <input id="first" type="text">
            </div>
            <div>
                <label>Last Name:</label>
                <input id="last" type="text">
